services:
  api-gateway:
    build:
      context: ./api-gateway
    image: cosmoscan-api-gateway:latest
    container_name: cosmoscan-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - FILE_SERVICE_URL=http://file-service:8081
      - ANALYSIS_SERVICE_URL=http://analysis-service:8082
    depends_on:
      - file-service
      - analysis-service
    networks:
      - cosmoscan-network

  file-service:
    build:
      context: ./file-service
    image: cosmoscan-file-service:latest
    container_name: cosmoscan-file
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:filedb
      - APP_STORAGE_LOCATION=/data/files
    volumes:
      - file-data:/data/files
    networks:
      - cosmoscan-network

  analysis-service:
    build:
      context: ./analysis-service
    image: cosmoscan-analysis-service:latest
    container_name: cosmoscan-analysis
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - FILE_SERVICE_URL=http://file-service:8081
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:analysisdb
      - APP_WORDCLOUD_OUTPUT_DIR=/data/wordclouds
    volumes:
      - wordcloud-data:/data/wordclouds
    depends_on:
      - file-service
    networks:
      - cosmoscan-network

volumes:
  file-data:
  wordcloud-data:

networks:
  cosmoscan-network:
    driver: bridge