server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: file-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:filedb}
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  storage:
    location: ${APP_STORAGE_LOCATION:./data/files}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html