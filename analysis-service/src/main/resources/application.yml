server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: analysis-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:analysisdb}
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  file-service:
    url: ${FILE_SERVICE_URL:http://localhost:8081}
  wordcloud:
    output-dir: ${APP_WORDCLOUD_OUTPUT_DIR:./data/wordclouds}

resilience4j:
  circuitbreaker:
    instances:
      fileService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html